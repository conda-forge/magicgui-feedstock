{% set name = "magicgui" %}
{% set version = "0.10.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: ae7a4cbb7ef2028b827b1877cf0b06743d756074fe6ef849391d62448ab7b65d

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install --no-deps --ignore-installed . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling >=1.8.0
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - docstring_parser >=0.7
    - psygnal >=0.6.1
    - qtpy >=1.7.0
    - superqt >=0.6.1
    - typing_extensions >=4.6
    - pyconify >=0.1.4

test:
  requires:
    - pyside2
    - python {{ python_min }}
  imports:
    - magicgui

about:
  home: https://github.com/pyapp-kit/magicgui
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Build GUIs from python types.
  doc_url: https://pyapp-kit.github.io/magicgui/
  dev_url: https://github.com/pyapp-kit/magicgui

extra:
  recipe-maintainers:
    - tlambert03
